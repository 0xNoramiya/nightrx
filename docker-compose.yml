version: '3.8'
services:
  midnight-node:
    image: midnightntwrk/midnight-node:0.22.3
    ports:
      - "9944:9944"
    restart: unless-stopped

  indexer:
    image: midnightntwrk/indexer-standalone:4.0.1
    ports:
      - "8088:8088"
    depends_on:
      - midnight-node
    restart: unless-stopped

  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    ports:
      - "6300:6300"
    restart: unless-stopped
